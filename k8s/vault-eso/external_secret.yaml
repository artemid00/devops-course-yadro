apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dockerhub-secret
  namespace: default

spec:
  refreshInterval: 1h

  secretStoreRef:
    name: vault-store
    kind: ClusterSecretStore

  target:
    name: dockerhub-secret
    creationPolicy: Owner

    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "https://index.docker.io/v1/": {
                "username": "{{ .username }}",
                "password": "{{ .token }}",
                "auth": "{{ printf "%s:%s" .username .token | b64enc }}"
              }
            }
          }

  data:
    - secretKey: username
      remoteRef:
        key: dockerhub
        property: username

    - secretKey: token
      remoteRef:
        key: dockerhub
        property: token
