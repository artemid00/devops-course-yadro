services:
  currency:
    build: .
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      - PORT=${PORT:-8000}
      - AUTHOR=${AUTHOR:-"a.bezpyatko"}
      - VERSION=${VERSION:-"1.1.0"}
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:${PORT:-8000}/info || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    user: "1001:1001"
    read_only: true
    cap_drop: ["ALL"]
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
            memory: 256m
            cpus: "0.5"
