services:
  currency:
    build: .
    ports:
      - "${PORT}:${PORT}"
    environment:
      - PORT=$PORT
      - AUTHOR=$AUTHOR
      - VERSION=$VERSION
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:${PORT}/info || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    user: "1001:1001"
    read_only: true
    cap_drop: ["ALL"]
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
            memory: 256m
            cpus: "0.5"
