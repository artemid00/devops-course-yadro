stages:
  - lint
  - test
  - build
  - deploy

lint_job:
  stage: lint
  tags:
    - docker
  image: hadolint/hadolint:57e1618d78fd469a92c1e584e8c9313024656623-alpine-amd64
  rules:
    - exists:
        - Dockerfile
  script:
    - echo "============= Run lint Dockerfile ============"
    - hadolint Dockerfile
    - echo "============= Lint success! ================="

test_job:
  stage: test
  tags:
    - docker
  image: golang@sha256:8e02eb337d9e0ea459e041f1ee5eece41cbb61f1d83e7d883a3e2fb4862063fa
  rules:
    - exists:
        - main.go
  before_script:
    - apk add --no-cache curl
  script:
    - echo "=============== Run tests ==============="
    - chmod +x run_tests.sh
    - ./run_tests.sh

build_job:
  stage: build
  tags:
    - docker
  rules:
  - exists:
      - Dockerfile
  image:
    name: gcr.io/kaniko-project/executor:v1.22.0-debug
    entrypoint: [""]
  script:
    - echo "=============== Run build ==============="
    - mkdir -p images
    - /kaniko/executor --context "${CI_PROJECT_DIR}" --dockerfile "${CI_PROJECT_DIR}/Dockerfile" --no-push --tar-path=images/image.tar
  artifacts:
    when: on_success
    expire_in: 1 days
    paths:
      - images/

secure_job:
  stage: build
  needs:
    - build_job
  tags:
    - docker
  image: 
    name: aquasec/trivy@sha256:bcc376de8d77cfe086a917230e818dc9f8528e3c852f7b1aff648949b6258d1c
    entrypoint: [""]
  script:
    - echo "=============== Run secure check ==============="
    - trivy image --input images/image.tar --severity=HIGH,CRITICAL --exit-code 1
  artifacts:
    when: on_success
    expire_in: 1 days
    paths:
      - images/ 

push_job:
  stage: build
  needs:
    - secure_job
  variables:
    APP_NAME: currency_api
  image:
    name: quay.io/skopeo/stable@sha256:45ba953b9fd686af45b7f251410c8e923775745aa969f3dba8b467d453d6c7ee
    entrypoint: [""]
  script:
    - echo "=============== Push image to docker hub ==============="
    - skopeo copy --dest-creds "$DOCKER_HUB_USER:$DOCKER_HUB_TOKEN" docker-archive:images/image.tar "docker://docker.io/$DOCKER_HUB_USER/$APP_NAME:$CI_COMMIT_SHA"

deploy_job:
  stage: deploy
  tags:
    - shell
  script:
    - docker compose down
    - docker compose up -d
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"'
      when: manual
    - when: never
