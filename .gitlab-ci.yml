stages:
  - lint
  - sast
  - build
  - sca
  - push
  - deploy

lint_code:
  stage: lint
  tags:
    - docker
  image: golangci/golangci-lint@sha256:72bcd68512b4e27540dd3a778a1b7afd45759d8145cfb3c089f1d7af53e718e9
  needs: []
  rules:
    - exists: 
        - main.go
  script:
    - echo "============= Lint Code ============"
    - golangci-lint run --output.json.path reports/golang-lint-report.json  ./... 
    - echo "============= Lint Done ============"
  artifacts:
    when: always
    paths:
      - reports/golang-lint-report.json

lint_dockerfile:
  stage: lint
  tags:
    - docker
  image: hadolint/hadolint:57e1618d78fd469a92c1e584e8c9313024656623-alpine-amd64
  needs: []
  rules:
    - exists:
        - Dockerfile
  script:
    - echo "============= Lint Dockerfile ============"
    - hadolint -f json Dockerfile > reports/hadolint-report.json
    - echo "============= Lint success! ================="
  artifacts:
    when: always
    paths:
      - reports/hadolint-report.txt

sast_job:
  stage: sast
  tags: 
    - docker
  needs: []
  image: semgrep/semgrep@sha256:892ae188a616ee77e5fb6d151602283cb9ec2ed5d4cf5f45f7eace619d9e685b
  variables:
    SEMGREP_APP_TOKEN: ""
  script:
    - echo "============= SCAN APP ============"
    - semgrep scan --config ci/conf/ci-rules.yml --config ci/conf/go-rules.yml --metrics=off --severity ERROR --json --output reports/semgrep-report.json . 
    - echo "============= SCAN DONE ============"
  artifacts:
    when: always
    paths:
      - reports/semgrep-report.json

build_job:
  stage: build
  tags:
    - docker
  rules:
  - exists:
      - Dockerfile
  image:
    name: gcr.io/kaniko-project/executor:v1.22.0-debug
    entrypoint: [""]
  script:
    - echo "=============== Build image ==============="
    - mkdir -p images
    - /kaniko/executor --context "${CI_PROJECT_DIR}" --dockerfile "${CI_PROJECT_DIR}/Dockerfile" --no-push --tar-path=images/image.tar
    - echo "=============== Build Done ==============="
  artifacts:
    when: on_success
    expire_in: 1 days
    paths:
      - images/

sca_job:
  stage: sca
  needs:
    - build_job
  tags:
    - docker
  image: 
    name: aquasec/trivy@sha256:bcc376de8d77cfe086a917230e818dc9f8528e3c852f7b1aff648949b6258d1c
    entrypoint: [""]
  script:
    - echo "=============== Run SCA check ==============="
    - trivy image --input images/image.tar --severity=HIGH,CRITICAL --exit-code 1
    - echo "=============== SCA check Done ==============="
  artifacts:
    when: on_success
    expire_in: 1 days
    paths:
      - images/ 

push_job:
  stage: push
  needs:
    - sca_job
  variables:
    APP_NAME: currency_api
  image:
    name: quay.io/skopeo/stable@sha256:45ba953b9fd686af45b7f251410c8e923775745aa969f3dba8b467d453d6c7ee
    entrypoint: [""]
  script:
    - echo "=============== Push image to docker hub ==============="
    - skopeo copy --dest-creds "$DOCKER_HUB_USER:$DOCKER_HUB_TOKEN" docker-archive:images/image.tar "docker://docker.io/$DOCKER_HUB_USER/$APP_NAME:$CI_COMMIT_SHA"
    - echo "=============== Image pushed successfully ==============="

deploy_job:
  stage: deploy
  tags:
    - shell
  script:
    - docker compose -f docker-compose.hardened.yml down
    - docker compose -f docker-compose.hardened.yml up -d
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"'
      when: manual
    - when: never


