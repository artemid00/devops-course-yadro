stages:
  - leaks
  - lint
  - sast
  - build
  - push
  - deploy
  - dast

# ===============================================

.rules_build: &rules_build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_TAG =~ /^v.*/'
      exists:
        - Dockerfile
    - when: never

.rules_push: &rules_push
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_TAG =~ /^v.*/'
      when: always
    - when: never

.build_script: &build_script
  - apk add --no-cache curl jq
  - |
    export VAULT_TOKEN=$(curl -s -X POST "$VAULT_ADDR/v1/auth/jwt/login" -d "{\"role\":\"$VAULT_ROLE\",\"jwt\":\"$VAULT_ID_TOKEN\"}" | jq -r '.auth.client_token')
    export DOCKER_USER=$(curl -s -H "X-Vault-Token: $VAULT_TOKEN" "$VAULT_ADDR/v1/kv/data/dockerhub" | jq -r '.data.data.username')
    export DOCKER_TOKEN=$(curl -s -H "X-Vault-Token: $VAULT_TOKEN" "$VAULT_ADDR/v1/kv/data/dockerhub" | jq -r '.data.data.token')
    
    mkdir -p /kaniko/.docker images
    AUTH_STRING=$(echo -n "$DOCKER_USER:$DOCKER_TOKEN" | base64)
    echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"$AUTH_STRING\"}}}" > /kaniko/.docker/config.json
    export DOCKER_CONFIG=/kaniko/.docker

.push_script: &push_script
  - apk add --no-cache curl jq skopeo
  - |
    if [[ -n "$CI_COMMIT_TAG" ]]; then
      IMAGE_TAG="$CI_COMMIT_TAG"
    else
      IMAGE_TAG="$CI_COMMIT_SHA"
    fi
    
    export VAULT_TOKEN=$(curl -s -X POST "$VAULT_ADDR/v1/auth/jwt/login" -d "{\"role\":\"$VAULT_ROLE\",\"jwt\":\"$VAULT_ID_TOKEN\"}" | jq -r '.auth.client_token')
    export DOCKER_USER=$(curl -s -H "X-Vault-Token: $VAULT_TOKEN" "$VAULT_ADDR/v1/kv/data/dockerhub" | jq -r '.data.data.username')
    export DOCKER_TOKEN=$(curl -s -H "X-Vault-Token: $VAULT_TOKEN" "$VAULT_ADDR/v1/kv/data/dockerhub" | jq -r '.data.data.token')


.artifacts_default: &artifacts_default
  when: always
  expire_in: 7 days

# ===============================================

check_leaks:
  stage: leaks
  tags: 
    - docker
  image:
    name: zricethezav/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f
    entrypoint: [""]
  rules:
    - when: always
  script:
    - echo "============= Search Leaks ============="
    - gitleaks detect --source . --exit-code 1 --redact
    - echo "============= Done ============="

lint_code:
  stage: lint
  tags: 
    - docker
  image: golangci/golangci-lint@sha256:72bcd68512b4e27540dd3a778a1b7afd45759d8145cfb3c089f1d7af53e718e9
  needs: []
  rules:
    - changes: 
        - "**/*.go"
        - go.mod
        - go.sum
  script:
    - echo "============= Lint Code ============"
    - golangci-lint run --output.json.path golang-lint-report.json  ./... 
    - echo "============= Lint Done ============"
  artifacts:
    <<: *artifacts_default
    paths:
      - golang-lint-report.json

lint_dockerfile:
  stage: lint
  tags: 
    - docker
  image: hadolint/hadolint:57e1618d78fd469a92c1e584e8c9313024656623-alpine-amd64
  needs: []
  rules:
    - changes:
        - Dockerfile
  script:
    - echo "============= Lint Dockerfile ============"
    - hadolint -f json Dockerfile > hadolint-report.json
    - echo "============= Lint success! ================="
  artifacts:
    <<: *artifacts_default
    paths:
      - hadolint-report.json

sast_job:
  stage: sast
  tags: 
    - docker
  image: semgrep/semgrep@sha256:892ae188a616ee77e5fb6d151602283cb9ec2ed5d4cf5f45f7eace619d9e685b
  needs: []
  rules:
    - when: always
  variables:
    SEMGREP_APP_TOKEN: ""
  script:
    - echo "============= SCAN APP ============"
    - semgrep scan --config ci/conf/ci-rules.yml --config ci/conf/go-rules.yml --metrics=off --severity ERROR --json --output semgrep-report.json . 
    - echo "============= SCAN DONE ============"
  artifacts:
    <<: *artifacts_default
    paths:
      - semgrep-report.json

build_job:
  stage: build
  tags:
    - docker
  <<: *rules_build
  image:
    name: artemi00/kaniko_curl:1.0
    entrypoint: [""]
  id_tokens:
    VAULT_ID_TOKEN:
      aud: http://10.184.0.26:8200
  before_script:
    *build_script
  script:
    - echo "=============== Build image ==============="
    - /kaniko/executor --context "${CI_PROJECT_DIR}" --dockerfile "${CI_PROJECT_DIR}/Dockerfile" --no-push --tar-path=images/image.tar
    - echo "=============== Build Done ==============="
  artifacts:
    when: on_success
    expire_in: 1 days
    paths:
      - images/

sca_job:
  stage: build
  needs:
    - build_job
  <<: *rules_build
  tags:
    - docker
  image: 
    name: aquasec/trivy@sha256:bcc376de8d77cfe086a917230e818dc9f8528e3c852f7b1aff648949b6258d1c
    entrypoint: [""]
  script:
    - echo "=============== Run SCA check ==============="
    - trivy image --input images/image.tar --severity=HIGH,CRITICAL -f json -o trivy-report.json --exit-code 1
    - echo "=============== SCA check Done ==============="
  artifacts:
    <<: *artifacts_default
    paths:
      - images/ 
      - trivy-report.json

push_job:
  stage: push
  tags:
    - docker
  image: alpine@sha256:25109184c71bdad752c8312a8623239686a9a2071e8825f20acb8f2198c3f659    
  needs:
    - sca_job
  <<: *rules_push
  variables:
    APP_NAME: currency_api
  id_tokens:
    VAULT_ID_TOKEN:
      aud: http://10.184.0.26:8200
  before_script:
    *push_script
  script:
    - echo "============ PUSH IMAGE ============"
    - skopeo copy --dest-creds "$DOCKER_USER:$DOCKER_TOKEN" docker-archive:images/image.tar "docker://docker.io/$DOCKER_USER/$APP_NAME:$IMAGE_TAG"
    - echo "============ PUSHED ============"

deploy:staging:
  stage: deploy
  variables:
    ENVIRONMENT: "staging"
    IMAGE_TAG: "$CI_COMMIT_SHA"
    APP_NAME: "currency_api"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"'
      when: always
    - when: never
  trigger:
    include:
      - local: ci/.gitlab-ci.deploy.yml
    strategy: depend

deploy:production:
  stage: deploy
  variables:
    ENVIRONMENT: "production"
    IMAGE_TAG: "$CI_COMMIT_TAG"
    APP_NAME: "currency_api"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'
      when: manual
    - when: never
  trigger:
    include:
      - local: ci/.gitlab-ci.deploy.yml
    strategy: depend

dast_job:
  stage: dast
  tags:
    - docker
  needs:
    - deploy:staging
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"'
      when: always
    - when: never
  image:
    name: ghcr.io/zaproxy/zaproxy:20260304-stable@sha256:47b883dca0d77aeef1dbb9b8ce1f4baddde348ad5852666e553456a9ad936111
    entrypoint: [""]
  variables:
    TARGET_URL: "http://10.184.0.155:8000/info"
  before_script:
    - mkdir -p /zap/wrk
    - cd /zap/wrk
  script:
    - echo "============= START DAST ============"
    - zap-baseline.py -t $TARGET_URL -J zap-report.json -m 5 -I
    - echo "============= DAST DONE ============"
  after_script:
    - cp /zap/wrk/* $CI_PROJECT_DIR/
  artifacts:
    <<: *artifacts_default
    paths:
      - zap-report.json