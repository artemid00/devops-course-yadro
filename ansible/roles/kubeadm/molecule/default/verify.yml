---
- name: Verify
  hosts: all
  become: true
  tasks:
    - name: Check if kubeadm binary exists
      ansible.builtin.stat:
        path: /usr/bin/kubeadm
      register: kubeadm_bin

    - name: Assert kubeadm binary is present
      ansible.builtin.assert:
        that:
          - kubeadm_bin.stat.exists
        fail_msg: "kubeadm binary not found"

    - name: Check kubeadm version
      ansible.builtin.command: kubeadm version
      register: kubeadm_out
      changed_when: false

    - name: Assert kubeadm version output is not empty
      ansible.builtin.assert:
        that:
          - kubeadm_out.stdout | length > 0
        fail_msg: "kubeadm version output is empty"
